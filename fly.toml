# fly.toml - Fly.io configuration for Home Control app
# Deploy with: fly launch / fly deploy
# Set secrets with: fly secrets set APP_SECRET=$(openssl rand -hex 32) APP_USERNAME=admin

app = "home-control"
primary_region = "ord"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

# Persistent volume for SQLite database
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
