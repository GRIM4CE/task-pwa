# Auto-generated release notes config.
# Categories below match the branch prefixes in CLAUDE.md.
# Apply matching labels to PRs (e.g. `feat`, `fix`) and they'll group automatically.
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies  # Dependabot PRs get their own section below
  categories:
    - title: Features
      labels: ["feat", "feature", "enhancement"]
    - title: Bug Fixes
      labels: ["fix", "bug"]
    - title: Performance
      labels: ["perf"]
    - title: Refactors
      labels: ["refactor"]
    - title: Documentation
      labels: ["docs"]
    - title: Tests
      labels: ["test"]
    - title: Chores
      labels: ["chore", "style"]
    - title: Dependencies
      labels: ["dependencies"]
    - title: Other Changes
      labels: ["*"]
