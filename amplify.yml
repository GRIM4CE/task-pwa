version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Amplify Hosting exposes env vars to the build but not the runtime SSR Lambda.
        # Write server-side vars to .env.production so Next.js bundles them into the build output.
        - |
          for v in TURSO_DATABASE_URL TURSO_AUTH_TOKEN APP_SECRET APP_USERNAME CRON_SECRET; do
            if [ -n "${!v}" ]; then
              echo "$v=${!v}" >> .env.production
            fi
          done
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - .next/cache/**/*
